<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" type="text/css" href="./index.css" />
    <title>Free Script Editor</title>
</head>

<body>
    <main>
        <div id="options">
            <div class="buttons">
                <div id="uploads">
                    <input type="file" id="script-upload" accept=".fdx" />
                    <button id="new-blank">New Blank Script</button>
                </div>
                <div id="downloads">
                    <p>Download as</p>
                    <button id="download-pdf">PDF</button>
                    <button id="download-fdx">FDX</button>
                </div>
            </div>
            <div>
                <label for="file-name">File Name</label>
                <input type="text" name="file-name" id="file-name">
            </div>
            <div id="version-feedback">
                <p>v0.18 <a href="mailto:josephjameshansen@gmail.com?subject=Free%20Script%20Editor%20Feedback">Provide
                        Feedback</a></p>

            </div>
        </div>
        <article id="script-main" contenteditable="true">
            <div class="page">
                <sceneheading><br></sceneheading>
            </div>
        </article>
    </main>

    <script src="./index.js" type="text/javascript" defer></script>
</body>

</html>

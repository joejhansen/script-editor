<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" type="text/css" href="./index.css" />
    <title>LibreScript</title>
</head>

<body>
    <main>
        <!-- <div id="measuring-element"></div> -->
        <!-- <div id="measuring-page"></div> -->
        <div id="options">
            <div id="uploads">
                <input type="file" id="script-upload" accept=".fdx" />
                <button id="new-blank">New Blank Script</button>
            </div>
            <div id="downloads">
                <p>Download as</p>
                <button id="download-pdf">PDF</button>
                <button id="download-fdx">FDX</button>
            </div>
        </div>
        <article id="script-main">
            <div class="page" contenteditable="true">
                <sceneheading class="screenplay-element"><br></sceneheading>
            </div>
        </article>
    </main>

    <script src="./index.js" type="text/javascript" defer></script>
</body>

</html>
